<div class="container mt-4">

    <input type="text" class="form-control" placeholder="Search product..." [formControl]="searchControl" />

</div>

<div class="container mt-4">

    <div class="row">

        <div class="col-md-4 mb-3" *ngFor="let p of products">

            <mat-card>

                <mat-card-title class="product-title">
                    {{ p.title }}
                </mat-card-title>

                <mat-card-subtitle>
                    {{ p.category }}
                </mat-card-subtitle>

                <img mat-card-image [src]="p.thumbnail" />

                <mat-card-content>
                    <p>{{ p.description }}</p>
                    <p><b>Price:</b> {{ p.price | currency:'INR' }}</p>
                </mat-card-content>

            </mat-card>

        </div>

    </div>

</div>
